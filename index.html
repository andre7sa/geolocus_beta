<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortalGeo - Geolocus Beta (BS5)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css" />
  <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
  <link rel="stylesheet" href="plugins/MousePosition/L.Control.MousePosition.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
  <link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
  <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
  <script src="plugins/MousePosition/L.Control.MousePosition.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
  <script src="plugins/minimap/Control.MiniMap.min.js"></script>
</head>

<body>

  <div class="offcanvas offcanvas-start shadow" data-bs-scroll="true" data-bs-backdrop="false" tabindex="-1"
    id="sidebar" aria-labelledby="sidebarLabel" style="width: 350px;">

    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold" id="sidebarLabel"><i
          class="bi bi-geo-alt-fill me-2 text-primary"></i>Informações dos Lotes</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>

    <div class="offcanvas-body p-3">
      <div id="lote_error"></div>

      <div class="row g-2 mt-2">
        <div class="col-8">
          <input type="text" id="lote_id" class="form-control" list="lotesList" placeholder="Ex: 01A">
          <datalist id="lotesList"></datalist>
          <div class="form-text mt-1" style="font-size: 11px;">
            <em>Lote e Quadra (Ex: 01A)</em>
          </div>
        </div>
        <div class="col-4">
          <button id="findlote" class="btn btn-primary w-100">Buscar</button>
        </div>
      </div>

<hr>
<div id="lote_information">
  <p class="text-muted text-center">Clique em um lote ou faça uma busca para ver os detalhes.</p>
</div>

<hr>
<div class="mt-3">
  <h6 class="fw-bold text-center mb-3">-------</h6>
  <canvas id="graficoLotes" width="100" height="100"></canvas>
</div>
    </div>
  </div>

  <div id="mapdiv" class="w-100" style="height: 100vh;"></div>

  <script>
    // --- CONFIGURAÇÃO INICIAL ---
    var mymap, baseLayers, overlays = {}, lyrSearch, control_layers;
    var lotes_array = [];
    var lotesLayer, quadrasLayer, equipamentosLayer, ruasLayer;
    var lotesLabelsGroup = L.layerGroup(), quadraLabelsGroup = L.layerGroup();

    var minZoomForLoteLabels = 19, minZoomForquadraLabels = 17, maxZoomForquadraLabels = 22;

    // --- 1. NO MAP INITIALIZE (Adicione a criação dos Panes) ---
    mymap = L.map("mapdiv", {
      center: [-8.000449, -38.308012],
      zoom: 16,
      attributionControl: false,
      zoomControl: false,
    });

    // Criando painéis customizados para garantir a ordem das camadas
    mymap.createPane('quadrasPane');
    mymap.getPane('quadrasPane').style.zIndex = 400; // Menor prioridade
    mymap.getPane('quadrasPane').style.pointerEvents = 'none'; // Impede que a quadra intercepte o mouse

    mymap.createPane('lotesPane');
    mymap.getPane('lotesPane').style.zIndex = 450; // Maior prioridade que as quadras

    // --- CAMADAS DE MAPA ---
    var googleStreets = L.tileLayer("http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}", { maxZoom: 23, subdomains: ["mt0", "mt1", "mt2", "mt3"] });
    var googleSat = L.tileLayer("http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", { maxZoom: 23, subdomains: ["mt0", "mt1", "mt2", "mt3"] }).addTo(mymap);
    var openStreetMap = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png?", { maxZoom: 23 });
    var CartoDB_Voyager = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", { maxZoom: 23 });
    var Esri_WorldImagery = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 23 });
    var Esri_WorldTopoMap = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", { maxZoom: 23 });
    var OpenTopoMap = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", { maxZoom: 23 });

    // --- CONTROLES ---
    // Instancia o Offcanvas do Bootstrap 5
    var sidebarOffcanvas = new bootstrap.Offcanvas(document.getElementById('sidebar'));

    // O botão de busca no mapa agora abre o Offcanvas
    L.easyButton("bi bi-search", function () {
      sidebarOffcanvas.toggle();
    }).addTo(mymap);

    L.control.scale({ maxWidth: 200, position: "bottomleft", metric: true, imperial: false }).addTo(mymap);
    L.control.zoom({ position: "topright" }).addTo(mymap);
    L.control.mousePosition({ position: "bottomright" }).addTo(mymap);
    mymap.pm.addControls({ position: "topleft", drawCircleMarker: false, rotateMode: true });

    var baseLayers = {
      "Google Streets": googleStreets,
      "Google Satellite": googleSat,
      "OpenStreetMap": openStreetMap,
      "CartoDB Voyager": CartoDB_Voyager,
      "Esri World Imagery": Esri_WorldImagery,
      "Esri World Topo Map": Esri_WorldTopoMap,
      "OpenTopoMap": OpenTopoMap
    };
    control_layers = L.control.layers(baseLayers, overlays, { position: "topright" }).addTo(mymap);

    // --- FUNÇÃO CENTRAL DE EXIBIÇÃO ---
    function selecionarLote(att, layer) {
      // 1. Formata o conteúdo (Quadra, Lote, Situação, Área e Perímetro)
      const infoHTML = `
        <div class="card border-0 bg-light">
          <div class="card-body p-2">
            <h6 class="card-title fw-bold text-primary mb-3">Detalhes do Imóvel</h6>
            <p class="mb-1"><strong>Quadra:</strong> ${att.Quadra}</p>
            <p class="mb-1"><strong>Lote:</strong> ${att.Lote}</p>
            <p class="mb-1"><strong>Situação:</strong> <span class="badge ${att.Situacao === 'Vendido' ? 'bg-success' : 'bg-warning text-dark'}">${att.Situacao}</span></p>
            <p class="mb-1"><strong>Área:</strong> ${att.Area || 'N/A'}</p>
            <p class="mb-1"><strong>Perímetro:</strong> ${att.Perimetro || 'N/A'}</p>
          </div>
        </div>`;

      // 2. Atualiza Sidebar e Garante que esteja aberta
      document.getElementById('lote_information').innerHTML = infoHTML;
      document.getElementById('lote_error').innerHTML = '';
      if (!document.getElementById('sidebar').classList.contains('show')) sidebarOffcanvas.show();

      // 3. Zoom e Popup no Mapa
      mymap.fitBounds(layer.getBounds(), { maxZoom: 21 });
      layer.bindPopup(infoHTML).openPopup();

      // 4. Destaque Visual (Selection Layer)
      if (lyrSearch) lyrSearch.remove();
      lyrSearch = L.geoJson(layer.toGeoJSON(), {
        style: { color: '#333', weight: 5, fillOpacity: 0, dashArray: '5, 5' }
      }).addTo(mymap);
    }

    // --- CARREGAMENTO DE DADOS (FETCH API) ---
    // Quadras 
    fetch("data/GeoJSON/quadras.geojson").then(res => res.json()).then(data => {
      quadrasLayer = L.geoJSON(data, {
        style: style_quadras,
        onEachFeature: process_quadras,
        pane: 'quadrasPane' // Vincula esta camada ao painel inferior
      }).addTo(mymap);
      control_layers.addOverlay(quadrasLayer, "Quadras");
    });

    // Lotes (No painel superior)
    fetch("data/GeoJSON/Lotes.geojson").then(res => res.json()).then(data => {
      lotesLayer = L.geoJSON(data, {
        style: style_lotes,
        onEachFeature: function (json, layer) {
          lotes_array.push(json.properties.lote_id);
          // Labels
          var marker = L.marker(layer.getBounds().getCenter(), {
            icon: L.divIcon({ html: `<div class="lote-label-marker">${json.properties.Lote}</div>`, iconSize: [0, 0], className: 'lote-marker-container' })
          });
          lotesLabelsGroup.addLayer(marker);

          // Eventos
          layer.on({
            mouseover: function (e) { e.target.setStyle({ weight: 4, color: '#3a3a3a' }); },
            mouseout: function (e) { lotesLayer.resetStyle(e.target); },
            click: function (e) { selecionarLote(e.target.feature.properties, e.target); }
          });
        },
        pane: 'lotesPane'
      }).addTo(mymap);

      control_layers.addOverlay(lotesLayer, "Lotes");

      // Popular Autocomplete
      const datalist = document.getElementById('lotesList');
      lotes_array.forEach(id => {
        let opt = document.createElement('option'); opt.value = id; datalist.appendChild(opt);
      });
    });

    // Demais camadas
    fetch("data/GeoJSON/Equipamentos_Publicos.geojson").then(res => res.json()).then(data => {
      equipamentosLayer = L.geoJSON(data, { style: style_equipamentos }).addTo(mymap);
      control_layers.addOverlay(equipamentosLayer, "Equipamentos");
    });
    fetch("data/GeoJSON/Ruas.geojson").then(res => res.json()).then(data => {
      ruasLayer = L.geoJSON(data, { style: style_ruas }).addTo(mymap);
      control_layers.addOverlay(ruasLayer, "Ruas");
    });

    // --- FUNÇÕES AUXILIARES ---

    function style_lotes(json) {
      var s = json.properties.Situacao;
      var color = (s === 'Vendido') ? '#99d594' : (s === 'Em Negociação') ? '#fc8d59' : '#ffffbf';
      return { color: '#000', fillColor: color, weight: 1, opacity: 1, fillOpacity: 0.7 };
    }

    function process_lotes(json, layer) {
      lotes_array.push(json.properties.lote_id);
      layer.bindPopup("<b>Lote: </b>" + json.properties.Lote);
      var marker = L.marker(layer.getBounds().getCenter(), {
        icon: L.divIcon({ html: '<div class="lote-label-marker">' + json.properties.Lote + '</div>', iconSize: [0, 0], className: 'lote-marker-container' })
      });
      lotesLabelsGroup.addLayer(marker);
      layer.on({ mouseover: highlightFeature, mouseout: resetHighlight, click: zoomToFeature });
    }

    function style_quadras(json) { return { color: "black", weight: 0.5, fillOpacity: 0 }; }

    function process_quadras(json, layer) {
      var marker = L.marker(layer.getBounds().getCenter(), {
        icon: L.divIcon({ html: '<div class="quadra-label-marker">' + json.properties.Quadra + '</div>', iconSize: [0, 0], className: 'quadra-marker-container' })
      });
      quadraLabelsGroup.addLayer(marker);
    }

    function style_equipamentos() { return { color: "black", fillColor: "green", weight: 1, fillOpacity: 0.7 }; }
    function style_ruas() { return { color: "black", fillColor: "gray", weight: 1, fillOpacity: 0.8 }; }

    // --- GESTÃO DE RÓTULOS ---
    function updateLabels() {
      var zoom = mymap.getZoom();
      if (lotesLayer && mymap.hasLayer(lotesLayer) && zoom >= minZoomForLoteLabels) {
        if (!mymap.hasLayer(lotesLabelsGroup)) mymap.addLayer(lotesLabelsGroup);
      } else { mymap.removeLayer(lotesLabelsGroup); }

      if (quadrasLayer && mymap.hasLayer(quadrasLayer) && zoom >= minZoomForquadraLabels && zoom <= maxZoomForquadraLabels) {
        if (!mymap.hasLayer(quadraLabelsGroup)) mymap.addLayer(quadraLabelsGroup);
      } else { mymap.removeLayer(quadraLabelsGroup); }
    }
    mymap.on('zoomend overlayadd overlayremove', updateLabels);

    // --- BUSCA ---
    // --- NOVA FUNÇÃO DE BUSCA (VANILLA JS) ---
    document.getElementById('findlote').addEventListener('click', function () {
      const id = document.getElementById('lote_id').value.toUpperCase();
      let foundLayer = false;
      lotesLayer.eachLayer(l => { if (l.feature.properties.lote_id === id) foundLayer = l; });

      if (foundLayer) {
        selecionarLote(foundLayer.feature.properties, foundLayer);
      } else {
        document.getElementById('lote_error').innerHTML = '<div class="alert alert-danger p-2 small">Lote não encontrado.</div>';
      }
    });

    function style_lotes(json) {
      const s = json.properties.Situacao;
      const color = (s === 'Vendido') ? '#99d594' : (s === 'Em Negociação' ? '#fc8d59' : '#ffffbf');
      return { color: '#000', fillColor: color, weight: 1, fillOpacity: 0.7 };
    }

    // Gestão de Rótulos por Zoom
    mymap.on('zoomend overlayadd overlayremove', function () {
      const zoom = mymap.getZoom();
      if (lotesLayer && mymap.hasLayer(lotesLayer) && zoom >= minZoomForLoteLabels) {
        if (!mymap.hasLayer(lotesLabelsGroup)) mymap.addLayer(lotesLabelsGroup);
      } else { mymap.removeLayer(lotesLabelsGroup); }
    });
  </script>
</body>

</html>
