<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortalGeo</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/2.0.0-alpha/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <link rel="stylesheet" href="source/jquery-ui.min.css" />
  <link rel="stylesheet" href="plugins/sidebar/L.Control.Sidebar.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.css" />
  <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
  <link rel="stylesheet" href="plugins/MousePosition/L.Control.MousePosition.css" />
  <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
  <link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet-src.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="plugins/sidebar/L.Control.Sidebar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
  <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
  <script src="plugins/MousePosition/L.Control.MousePosition.js"></script>
  <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
  <script src="plugins/minimap/Control.MiniMap.min.js"></script>
  <script src="plugins/ajax/leaflet.ajax.js"></script>

  <style>
    .bold {
      font-weight: bold;
      font-size: 16px;
    }

    .errorMsg {
      padding: 0;
      text-align: center;
      background-color: darksalmon;
    }
  </style>

  <style>
    #map {
      width: 800px;
      height: 500px;
    }

    .info {
      padding: 6px 8px;
      font: 14px/16px Arial, Helvetica, sans-serif;
      background: white;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      border-radius: 5px;
    }

    .info h4 {
      margin: 0 0 5px;
      color: #777;
    }

    .legend {
      text-align: left;
      line-height: 18px;
      color: #555;
    }

    .legend i {
      width: 18px;
      height: 18px;
      float: left;
      margin-right: 8px;
      opacity: 0.7;
    }
  </style>

</head>

<body>

  <div id="sidebar" class="col-md-3">
    <div id="divValve class=" col-xs-12">

      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="col-xs-12">
        <p class="text-center bold">Informações da Válvula</p>
      </div>
      <div class="col-xs-12 errorMsg" id="valve_error"></div>
      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="form-group">
        <div class="col-xs-6">
          <input type="text" id="valve_id" class="form-control" placeholder="Valve ID">
        </div>
        <div class="col-xs-6">
          <button id="findValve" class="btn btn-primary">Buscar Válvula</button>
        </div>
      </div>

      <div class="col-xs-12" id="valve_information">

      </div>

    </div>

    <div class="col-xs-12" style="height: 50px;"></div>

    <div id="divValve class=" col-xs-12">

      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="col-xs-12">
        <p class="text-center bold">Informações da Rede</p>
      </div>
      <div class="col-xs-12 errorMsg" id="pipeline_error"></div>
      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="form-group">
        <div class="col-xs-6">
          <input type="text" id="pipeline_id" class="form-control" placeholder="Pipeline ID">
        </div>
        <div class="col-xs-6">
          <button id="findPipeline" class="btn btn-primary">Buscar Tubo</button>
        </div>
      </div>

      <div class="col-xs-12" id="pipeline_information">

      </div>

    </div>

    <div class="col-xs-12" style="height: 50px;"></div>

    <div id="divValve class=" col-xs-12">

      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="col-xs-12">
        <p class="text-center bold">Informações das Construções</p>
      </div>
      <div class="col-xs-12 errorMsg" id="building_error"></div>
      <div class="col-xs-12" style="height: 10px;"></div>

      <div class="form-group">
        <div class="col-xs-6">
          <input type="text" id="building_id" class="form-control" placeholder="01A">
          <p class="text-muted" style="font-size: 12px;"><em>Exp.: 01A (Lote 01, Quadra A)</em></p>
        </div>
        <div class="col-xs-6">
          <button id="findBuilding" class="btn btn-primary">Buscar Lote</button>
        </div>
      </div>

      <div class="col-xs-12" id="building_information">

      </div>

    </div>

  </div>

  <div id="mapdiv" class="col-md-12"></div>

  <script>

    // INITIALIZE MAP

    var mymap;
    var baseLayers;
    var overlays;


    mymap = L.map("mapdiv", {
      center: [-8.000449, -38.308012],
      zoom: 16,
      attributionControl: false,
      zoomControl: false,
    });

    // DEFINE TILE LAYERS
    var googleStreets = L.tileLayer("http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}", { maxZoom: 23, subdomains: ["mt0", "mt1", "mt2", "mt3"] },);
    var googleSat = L.tileLayer("http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}", { maxZoom: 23, subdomains: ["mt0", "mt1", "mt2", "mt3"] },);
    var openStreetMap = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png?", { maxZoom: 23 },);
    var CartoDB_Voyager = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", { maxZoom: 23 },);
    var Esri_WorldImagery = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 23 },);
    var Esri_WorldImagery_minimap = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 23 },);
    var Stadia_AlidadeSatellite = L.tileLayer("https://tiles.stadiamaps.com/tiles/alidade_satellite/{z}/{x}/{y}{r}.jpg", { maxZoom: 23 },);
    var Esri_WorldTopoMap = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", { maxZoom: 23 },);
    var OpenTopoMap = L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", { maxZoom: 23, },);

    googleSat.addTo(mymap);

    //SIDEBAR
    var sidebar = L.control.sidebar("sidebar", { position: "left", });

    mymap.addControl(sidebar);
    sidebar.show();

    //EASY BUTTON
    L.easyButton("glyphicon glyphicon-transfer", function (btn, map) {
      sidebar.toggle();
    }).addTo(mymap);

    //SCALE
    L.control
      .scale({
        maxWidth: 200,
        position: "bottomleft",
        metric: true,
        imperial: false,
      })
      .addTo(mymap);

    //ZOOM CONTROL
    L.control.zoom({ position: "topright", }).addTo(mymap);

    //MEASURE TOOL
    L.control
      .polylineMeasure({
        position: "topright",
        unit: "kilometres",
        showBearings: false,
        clearMeasurementsOnStop: false,
        showClearControl: true,
        showUnitControl: true,
        bearingTextIn: "In",
        bearingTextOut: "Out",
      })
      .addTo(mymap);

    //MOUSE POSITION
    L.control.mousePosition({ position: "bottomright" }).addTo(mymap);

    //DRAW CONTROL OR GEOMAN CONTROL
    mymap.pm.addControls({
      position: "topleft",
      drawCircleMarker: false,
      rotateMode: true,
    });

    mymap.on("pm:create", function (e) {
      console.log(e);
    });

    //MINIMAP
    var miniMap = new L.Control.MiniMap(Esri_WorldImagery_minimap, {
      position: "bottomright",
      width: 150,
      height: 150
    }).addTo(mymap);

    //LAYER CONTROL
    baseLayers = {
      "Google Streets": googleStreets,
      "Google Satellite": googleSat,
      "OpenStreetMap": openStreetMap,
      "CartoDB Voyager": CartoDB_Voyager,
      "Esri World Imagery": Esri_WorldImagery,
      "Stadia Alidade Satellite": Stadia_AlidadeSatellite,
      "Esri World Topo Map": Esri_WorldTopoMap,
      "OpenTopoMap": OpenTopoMap
    };

    var control_layers = L.control.layers(baseLayers, overlays, { position: "topright" }).addTo(mymap);

    //DATA LOADING

    //NOS
    var nos = L.geoJson.ajax("data/GeoJSON/NOS.geojson", { pointToLayer: style_nos }).addTo(mymap);

    function style_nos(json, latlng) {
      var att = json.properties;
      var color;
      var fillColor;
      var radius = 5;
      var fillOpacity = 1;
      switch (att.TEXTSTRING) {
        case '62':
          color = '#d35400';
          fillColor = '#d35400';
          break;
        case '52':
          color = '#2E86C1';
          fillColor = '#2E86C1';
          break;
        case '30':
          color = '#8E44AD';
          fillColor = '#8E44AD';
          break;
        default:
          color = '#1cc910';
          fillColor = '#1cc910';
          break;
      }

      var style = {
        radius: radius,
        fillColor: fillColor,
        color: color,
        weight: 1,
        opacity: 1,
        fillOpacity: fillOpacity
      };

      return L.circleMarker(latlng, style);
    }

    control_layers.addOverlay(nos, "Nós");

    //LOTES

    var lotes = L.geoJson.ajax("data/GeoJSON/Lotes.geojson", { style: style_lotes, onEachFeature: process_lotes }).addTo(mymap);

    function style_lotes(json) {
      var att = json.properties;
      var color;
      var fillColor;
      var fillOpacity = 0.7;
      switch (att.Situacao) {
        case 'Disponível ':
          color = '#000000';
          fillColor = '#ffffbf';
          break;
        case 'Em Negociação':
          color = '#000000';
          fillColor = '#fc8d59';
          break;
        case 'Vendido':
          color = '#000000';
          fillColor = '#99d594';
          break;
        default:
          color = '#000000';
          fillColor = '#b5b251';
          break;
      }

      var styleL = {
        color: color,
        fillColor: fillColor,
        weight: 1,
        opacity: 1,
        fillOpacity: fillOpacity,
        dashArray: '0'
      };

      return styleL;
    }

    function process_lotes(json, layer) {
      var att = json.properties;
      var popupContent = "<b>Quadra: </b>" + att.Quadra + "<br><b>Lote: </b>" + att.Lote +
        "<br><b>Situação: </b>" + att.Situacao + "<br><b>Área: </b>" + att.Area + "<br><b>Perímetro: </b>" + att.Perimetro;
      layer.bindPopup(popupContent);
      layer.on({
        mouseover: highlightFeature,
        mouseout: resetHighlight,
        click: zoomToFeature
      });
    }

    control_layers.addOverlay(lotes, "Lotes");

    //FUNÇÃO DE BUSCA DE LOTE
    $("#findBuilding").click(function () {
      var building_id = $("#building_id").val();
      console.log(building_id.toUpperCase());
      returnLayerByAtribute(lotes,"lote_id", building_id.toUpperCase());
    });

    //EQUIPAMENTOS
    var equipamentos = L.geoJson.ajax("data/GeoJSON/Equipamentos_Publicos.geojson", { style: style_equipamentos }).addTo(mymap);

    function style_equipamentos(json) {
      var style = {
        color: "black",
        fillColor: "green",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.7,
        dashArray: '0'
      };
      return style;
    }

    control_layers.addOverlay(equipamentos, "Equipamentos");

    //RUAS
    var ruas = L.geoJson.ajax("data/GeoJSON/Ruas.geojson", { style: style_ruas }).addTo(mymap);

    function style_ruas(json) {
      var style = {
        color: "black",
        fillColor: "gray",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.8,
        dashArray: '0'
      };
      return style;
    }

    control_layers.addOverlay(ruas, "Ruas");

    //GENERAL FUNCION TO FIND LAYER BY ATTRIBUTE
    function returnLayerByAtribute(layer, attribute, value) {
      var found = false;
      layer.eachLayer(function (l) {
        if (l.feature.properties[attribute] == value) {
          mymap.setView(l.getBounds().getCenter(), 18);
          l.openPopup();
          found = true;
        }
      });
      if (!found) {
        alert("Valor não encontrado: " + value);
      }
    }
    //FUNÇÕES DE INTERAÇÃO COM OS LOTES
    function highlightFeature(e) {
      var layer = e.target;

      layer.setStyle({
        weight: 6,
        color: '#303030',
        dashArray: '',
        fillOpacity: 0.7
      });

      layer.bringToFront();
    }

    function resetHighlight(e) {
      lotes.resetStyle(e.target);
    }

    function zoomToFeature(e) {
      mymap.fitBounds(e.target.getBounds());
    }

  </script>
</body>

</html>
